<body>

  <!-- ═══ HEADER ═══ -->
  <header class="site-header">
    <div class="container header-inner">
      <!-- Custom SVG Logo: geometric PH-style lamp silhouette -->
      <svg class="logo-mark" width="48" height="48" viewBox="0 0 48 48" fill="none" aria-label="Louis Poulsen">
        <!-- Outer shade -->
        <path d="M6 18 C6 12, 15 7, 24 7 C33 7, 42 12, 42 18" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <!-- Middle shade -->
        <path d="M10 21 C10 16, 16 12, 24 12 C32 12, 38 16, 38 21" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.7" stroke-linecap="round"/>
        <!-- Inner shade -->
        <path d="M15 23 C15 20, 19 17, 24 17 C29 17, 33 20, 33 23" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.5" stroke-linecap="round"/>
        <!-- Cord -->
        <line x1="24" y1="2" x2="24" y2="7" stroke="currentColor" stroke-width="1.2"/>
        <!-- Warm glow dot -->
        <circle cx="24" cy="21" r="2.5" fill="currentColor" opacity="0.2"/>
      </svg>

      <h1 class="site-title">Louis Poulsen 燈具選型</h1>
      <p class="site-subtitle">探索丹麥設計照明經典</p>

      <button class="theme-toggle" data-theme-toggle aria-label="切換深色模式">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- ═══ FILTER BAR ═══ -->
  <nav class="filter-bar" id="filterBar" aria-label="篩選器">
    <div class="container filter-inner">
      <select class="filter-select" id="filterType" aria-label="按類型篩選">
        <option value="">類型 / Type</option>
      </select>

      <select class="filter-select" id="filterDesigner" aria-label="按設計師篩選">
        <option value="">設計師 / Designer</option>
      </select>

      <input type="text" class="filter-search" id="filterSearch" placeholder="搜尋燈具名稱..." aria-label="搜尋燈具名稱">

      <button class="btn-reset" id="btnReset">全部</button>

      <span class="result-count" id="resultCount" aria-live="polite">載入中...</span>
    </div>
  </nav>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main class="container" id="mainContent">
    <!-- Loading State -->
    <div id="loadingState" class="card-grid">
      <!-- Skeleton cards injected by JS -->
    </div>

    <!-- Error State (hidden by default) -->
    <div id="errorState" class="state-message" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
      </svg>
      <h3>載入失敗</h3>
      <p>無法載入燈具資料，請確認 data 資料夾中有 JSON 檔案</p>
      <button class="btn-reset" onclick="loadLampData()">重試</button>
    </div>

    <!-- Empty Filter State (hidden by default) -->
    <div id="emptyState" class="state-message" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <h3>找不到符合條件的燈具</h3>
      <p>請嘗試調整篩選條件或清除搜尋</p>
      <button class="btn-reset" id="btnResetEmpty">清除篩選</button>
    </div>

    <!-- Product Grid (populated by JS) -->
    <div id="productGrid" class="card-grid" style="display:none;"></div>
  </main>

  <!-- ═══ DETAIL MODAL ═══ -->
  <div class="modal-overlay" id="detailModal" role="dialog" aria-modal="true" aria-label="燈具詳情">
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="關閉">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>

      <div class="modal-image-wrap" id="modalImageWrap">
        <!-- Image or placeholder injected by JS -->
      </div>

      <div class="modal-details" id="modalDetails">
        <!-- Details injected by JS -->
      </div>
    </div>
  </div>

  <!-- ═══ FOOTER ═══ -->
  <footer class="site-footer">
    <div class="container">
      <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>

    </div>
  </footer>

  <script src="./main.js"></script>
</body>
</html>
